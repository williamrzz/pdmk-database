<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDMK DATABASE - DASHBOARD</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom Mandalika Dark Theme UI */
        body {
            background-color: #0D0D0D;
            color: #E0E0E0;
        }
        .panel-card {
            background-color: #161616;
            border: 1px solid #262626;
        }
        .sub-card {
            background-color: #1E1E1E;
            border: 1px solid #2A2A2A;
        }
        .text-neon-green {
            color: #00FF87;
        }
        .bg-neon-green {
            background-color: #00FF87;
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased pb-10">

    <!-- TOP NAVIGATION BAR (Minimalis Khas UCP Panel) -->
    <nav class="bg-[#111111] border-b border-[#222222] px-4 py-3 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center space-x-2">
                <span class="text-sm font-black tracking-wider text-neon-green uppercase">MANDALIKA PDMK DATABASE</span>
            </div>
            <div class="flex items-center space-x-2">
                <!-- Status Badge -->
                <span class="text-[10px] font-bold px-2.5 py-1 rounded bg-[#1A3A2A] text-neon-green border border-[#22543D] uppercase">
                    ✓ Verified Personnel
                </span>
                <button onclick="handleLogout()" class="text-[10px] font-bold px-3 py-1 rounded bg-red-600/20 text-red-400 border border-red-500/30 hover:bg-red-600 hover:text-white uppercase transition-all cursor-pointer">
                    Keluar
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-4 mt-6 space-y-6">

        <!-- KOTAK INFORMASI AKUN PERSONNEL (PERSIS SEPERTI GAMBAR CONTOH) -->
        <div class="p-4 panel-card rounded-md">
            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Informasi Akun Personnel</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center md:text-left">
                <div>
                    <span class="block text-[10px] uppercase font-bold text-gray-500">Nama IC / UCP</span>
                    <span id="user-name" class="font-bold text-white">-</span>
                </div>
                <div>
                    <span class="block text-[10px] uppercase font-bold text-gray-500">Nomor Badge</span>
                    <span id="user-badge" class="font-bold text-blue-400">-</span>
                </div>
                <div>
                    <span class="block text-[10px] uppercase font-bold text-gray-500">Pangkat Saat Ini</span>
                    <span id="user-pangkat" class="inline-block mt-0.5 font-black text-xs text-neon-green uppercase">-</span>
                </div>
                <div>
                    <span class="block text-[10px] uppercase font-bold text-gray-500">Gaji Pokok</span>
                    <span id="user-gaji" class="font-bold text-yellow-400">-</span>
                </div>
            </div>

            <!-- Tombol Rahasia High Command Admin -->
            <div id="admin-panel-btn" class="hidden mt-4 pt-3 border-t border-[#222222]">
                <button onclick="alert('Menu High Command Rekap Gaji sedang disiapkan Jendral!')" class="w-full py-2 bg-purple-600/20 text-purple-400 border border-purple-500/30 text-xs font-bold uppercase rounded hover:bg-purple-600 hover:text-white transition-all cursor-pointer">
                    ⚙️ Open High Command Admin Panel
                </button>
            </div>
        </div>

        <!-- STRUKTUR FORM UTAMA (MINIMALIS GRID) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- FORM SETOR DUTY LOG -->
            <div class="p-5 panel-card rounded-md space-y-4">
                <div class="flex items-center space-x-2 pb-2 border-b border-[#222222]">
                    <span class="text-xs font-bold uppercase tracking-wider text-gray-300">🚨 Transmit Duty Log</span>
                </div>
                
                <div class="space-y-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Tanggal Patroli</label>
                        <input type="date" id="duty-date" class="w-full p-2 bg-[#1A1A1A] border border-[#333] rounded text-sm font-semibold text-white focus:outline-none focus:border-neon-green">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Jam Mulai</label>
                            <input type="time" id="duty-start" class="w-full p-2 bg-[#1A1A1A] border border-[#333] rounded text-sm font-semibold text-white focus:outline-none focus:border-neon-green">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Jam Selesai</label>
                            <input type="time" id="duty-end" class="w-full p-2 bg-[#1A1A1A] border border-[#333] rounded text-sm font-semibold text-white focus:outline-none focus:border-neon-green">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Link Screenshot Evidence</label>
                        <input type="text" id="duty-link" placeholder="https://i.imgur.com/..." class="w-full p-2 bg-[#1A1A1A] border border-[#333] rounded text-sm font-semibold text-white focus:outline-none focus:border-neon-green">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Keterangan / Catatan Dinas</label>
                        <textarea id="duty-remarks" placeholder="Patroli Lingkar Kota Mandalika..." class="w-full p-2 bg-[#1A1A1A] border border-[#333] rounded text-sm font-semibold text-white focus:outline-none focus:border-neon-green h-20 resize-none"></textarea>
                    </div>
                    <button onclick="submitDuty()" class="w-full py-2.5 bg-neon-green text-black font-bold uppercase tracking-wider text-xs rounded hover:bg-emerald-400 transition-all cursor-pointer mt-2">
                        Kirim Laporan Duty
                    </button>
                </div>
            </div>

            <!-- FORM PERIZINAN CUTI -->
            <div class="p-5 panel-card rounded-md space-y-4">
                <div class="flex items-center space-x-2 pb-2 border-b border-[#222222]">
                    <span class="text-xs font-bold uppercase tracking-wider text-gray-300">📝 Request Leave (Izin Cuti)</span>
                </div>

                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Mulai Cuti</label>
                            <input type="date" id="cuti-start" class="w-full p-2 bg-[#1A1A1A] border border-[#333] rounded text-sm font-semibold text-white focus:outline-none focus:border-neon-green">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Selesai Cuti</label>
                            <input type="date" id="cuti-end" class="w-full p-2 bg-[#1A1A1A] border border-[#333] rounded text-sm font-semibold text-white focus:outline-none focus:border-neon-green">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Alasan Penjelasan Cuti</label>
                        <textarea id="cuti-remarks" placeholder="Urusan OOC / Keperluan keluarga di dunia nyata..." class="w-full p-2 bg-[#1A1A1A] border border-[#333] rounded text-sm font-semibold text-white focus:outline-none focus:border-neon-green h-[142px] resize-none"></textarea>
                    </div>
                    <button onclick="submitCuti()" class="w-full py-2.5 bg-transparent border border-gray-600 text-gray-300 font-bold uppercase tracking-wider text-xs rounded hover:bg-gray-800 transition-all cursor-pointer mt-2">
                        Ajukan Permohonan Cuti
                    </button>
                </div>
            </div>

        </div>

    </div>

    <!-- CODE SCRIPT INTEGRASI JALUR GAIB SUPABASE -->
    <script>
        const SUPABASE_URL = "https://yizoloveqztkgrlxdnvq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpem9sb3ZlcXp0a2dybHhkbnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjA1MzIsImV4cCI6MjA5OTE5NjUzMn0.3nMMr8x0IS1U-KJvB6Z0QPcsr598k7jBjQYzMmBbXMA";

        // Cek Sesi Login HP
        const sessionData = localStorage.getItem('session_pdmk');
        if (!sessionData) {
            alert("Sesi habis / Belum Login!");
            window.location.href = 'index.html';
        }

        const user = JSON.parse(sessionData);

        // Pasang data profile
        document.getElementById('user-name').innerText = user.nama_ic;
        document.getElementById('user-badge').innerText = user.badge;
        document.getElementById('user-pangkat').innerText = user.pangkat;
        document.getElementById('user-gaji').innerText = `$${user.gaji_pokok.toLocaleString()}`;

        // Aktifkan panel admin rahasia jika true
        if (user.is_admin === true || user.is_admin === "true") {
            document.getElementById('admin-panel-btn').classList.remove('hidden');
        }

        // SUBMIT LOG DUTY PATROLI
        async function submitDuty() {
            const tanggal = document.getElementById('duty-date').value;
            const mulai = document.getElementById('duty-start').value;
            const selesai = document.getElementById('duty-end').value;
            const link = document.getElementById('duty-link').value.trim();
            const remarks = document.getElementById('duty-remarks').value.trim();

            if(!tanggal || !mulai || !selesai || !link) return alert("Mohon lengkapi semua kolom log!");

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/laporan_duty`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nama_ic: user.nama_ic,
                        badge: user.badge,
                        tanggal: tanggal,
                        jam_mulai: mulai,
                        jam_selesai: selesai,
                        evidence_link: link,
                        remarks: remarks,
                        status_approval: 'PENDING'
                    })
                });

                if(response.ok) {
                    alert("✅ Laporan Duty Log berhasil terkirim ke database!");
                    document.getElementById('duty-link').value = '';
                    document.getElementById('duty-remarks').value = '';
                } else { alert("Gagal mengirim data."); }
            } catch (error) { alert("Masalah koneksi database."); }
        }

        // SUBMIT FORM IZIN CUTI
        async function submitCuti() {
            const start = document.getElementById('cuti-start').value;
            const end = document.getElementById('cuti-end').value;
            const remarks = document.getElementById('cuti-remarks').value.trim();

            if(!start || !end || !remarks) return alert("Lengkapi form pengajuan cuti!");

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/laporan_cuti`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nama_ic: user.nama_ic,
                        badge: user.badge,
                        tanggal_mulai: start,
                        tanggal_selesai: end,
                        remarks: remarks,
                        status_approval: 'PENDING'
                    })
                });

                if(response.ok) {
                    alert("✅ Pengajuan cuti berhasil dikirim!");
                    document.getElementById('cuti-remarks').value = '';
                } else { alert("Gagal mengirim pengajuan."); }
            } catch (error) { alert("Masalah koneksi database."); }
        }

        function handleLogout() {
            localStorage.removeItem('session_pdmk');
            window.location.href = 'index.html';
        }
    </script>
</body>
                        </html>
