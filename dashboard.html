<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDMK DATABASE - DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .brutal-box { background: #ffffff; border: 3px solid #000000; box-shadow: 5px 5px 0px 0px #000000; }
        .brutal-btn { background: #1C2541; color: #ffffff; border: 3px solid #000000; box-shadow: 4px 4px 0px 0px #000000; transition: all 0.1s ease; }
        .brutal-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px 0px #000000; }
        .brutal-input { w-full; p-2.5; border: 3px solid #000000; font-weight: 600; }
        .brutal-input:focus { outline: none; }
    </style>
</head>
<body class="bg-[#E2E8F0] min-h-screen p-4 font-sans text-black">

    <!-- Top Navigation -->
    <div class="max-w-4xl mx-auto mb-6 p-4 brutal-box rounded-lg flex justify-between items-center bg-white">
        <div>
            <h1 class="text-xl font-black italic text-[#1C2541]">PDMK SYSTEM</h1>
            <p class="text-xs font-bold text-gray-500 uppercase">Mandalika Police Department</p>
        </div>
        <button onclick="handleLogout()" class="px-4 py-2 bg-red-500 border-2 border-black font-bold text-xs uppercase text-white shadow-[2px_2px_0px_0px_#000000] cursor-pointer">Logout</button>
    </div>

    <!-- Profil Anggota -->
    <div class="max-w-4xl mx-auto mb-6 p-5 brutal-box rounded-lg bg-yellow-300">
        <h2 class="text-sm font-black uppercase tracking-wider text-gray-700">🎖️ Personnel Profile</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-2">
            <div>
                <span class="block text-[10px] uppercase font-bold text-gray-600">Nama IC</span>
                <span id="user-name" class="font-extrabold text-base">-</span>
            </div>
            <div>
                <span class="block text-[10px] uppercase font-bold text-gray-600">Nomor Badge</span>
                <span id="user-badge" class="font-extrabold text-base">-</span>
            </div>
            <div>
                <span class="block text-[10px] uppercase font-bold text-gray-600">Pangkat</span>
                <span id="user-pangkat" class="bg-black text-white px-1.5 py-0.5 text-xs font-black rounded">-</span>
            </div>
            <div>
                <span class="block text-[10px] uppercase font-bold text-gray-600">Gaji Pokok</span>
                <span id="user-gaji" class="font-extrabold text-base text-green-700">-</span>
            </div>
        </div>

        <!-- Tombol Admin Rahasia -->
        <div id="admin-panel-btn" class="hidden mt-4 pt-3 border-t-2 border-black">
            <button onclick="alert('Halaman Rekap Gaji Admin sedang disiapkan pada modul berikutnya!')" class="w-full py-2 bg-purple-600 text-white font-black uppercase border-3 border-black shadow-[3px_3px_0px_0px_#000000] text-sm tracking-wide cursor-pointer">
                ⚙️ Open High Command Admin Panel
            </button>
        </div>
    </div>

    <!-- Konten Utama: Form Absen -->
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Form Duty Log -->
        <div class="p-5 brutal-box rounded-lg bg-white">
            <h3 class="text-base font-black uppercase mb-4 text-[#1C2541]">📸 Transmit Duty Log</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Tanggal Patroli</label>
                    <input type="date" id="duty-date" class="w-full p-2 border-3 border-black font-semibold focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1">Jam Mulai</label>
                        <input type="time" id="duty-start" class="w-full p-2 border-3 border-black font-semibold focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase mb-1">Jam Selesai</label>
                        <input type="time" id="duty-end" class="w-full p-2 border-3 border-black font-semibold focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Link Evidence / Screenshot</label>
                    <input type="text" id="duty-link" placeholder="https://i.imgur.com/..." class="w-full p-2 border-3 border-black font-semibold focus:outline-none">
                    <p class="text-[10px] text-gray-500 mt-1">*Sementara gunakan link gambar, fitur upload galeri langsung menyusul.</p>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Catatan / Keterangan Dinas</label>
                    <textarea id="duty-remarks" placeholder="Patroli Kota, Merespon 10-86, dll." class="w-full p-2 border-3 border-black font-semibold focus:outline-none h-20"></textarea>
                </div>
                <button onclick="submitDuty()" class="w-full py-2.5 brutal-btn font-bold uppercase tracking-wider text-sm cursor-pointer">Kirim Log Absen</button>
            </div>
        </div>

        <!-- Form Izin Cuti -->
        <div class="p-5 brutal-box rounded-lg bg-white">
            <h3 class="text-base font-black uppercase mb-4 text-gray-700">📝 Request Leave (Izin Cuti)</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Mulai Cuti</label>
                    <input type="date" id="cuti-start" class="w-full p-2 border-3 border-black font-semibold focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Selesai Cuti</label>
                    <input type="date" id="cuti-end" class="w-full p-2 border-3 border-black font-semibold focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Alasan Cuti / Izin</label>
                    <textarea id="cuti-remarks" placeholder="Alasan kepentingan OOC / IC..." class="w-full p-2 border-3 border-black font-semibold focus:outline-none h-32"></textarea>
                </div>
                <button onclick="submitCuti()" class="w-full py-2.5 brutal-btn font-bold uppercase tracking-wider text-sm bg-gray-600 cursor-pointer">Ajukan Cuti</button>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://yizoloveqztkgrlxdnvq.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpem9sb3ZlcXp0a2dybHhkbnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjA1MzIsImV4cCI6MjA5OTE5NjUzMn0.3nMMr8x0IS1U-KJvB6Z0QPcsr598k7jBjQYzMmBbXMA";

        // Proteksi Halaman: Cek apakah sudah login?
        const sessionData = localStorage.getItem('session_pdmk');
        if (!sessionData) {
            alert("Akses ditolak! Anda harus login terlebih dahulu.");
            window.location.href = 'index.html';
        }

        const user = JSON.parse(sessionData);

        // Tampilkan Data Profil Anggota
        document.getElementById('user-name').innerText = user.nama_ic;
        document.getElementById('user-badge').innerText = user.badge;
        document.getElementById('user-pangkat').innerText = user.pangkat;
        document.getElementById('user-gaji').innerText = `$${user.gaji_pokok.toLocaleString()}`;

        // Jika dia Admin, munculkan tombol rahasia High Command
        if (user.is_admin === true || user.is_admin === "true") {
            document.getElementById('admin-panel-btn').classList.remove('hidden');
        }

        // FUNGSI SUBMIT DUTY LOG
        async function submitDuty() {
            const tanggal = document.getElementById('duty-date').value;
            const mulai = document.getElementById('duty-start').value;
            const selesai = document.getElementById('duty-end').value;
            const link = document.getElementById('duty-link').value.trim();
            const remarks = document.getElementById('duty-remarks').value.trim();

            if(!tanggal || !mulai || !selesai || !link) return alert("Mohon lengkapi data absen!");

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/laporan_duty`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nama_ic: user.nama_ic,
                        badge: user.badge,
                        tanggal: tanggal,
                        jam_mulai: mulai,
                        jam_selesai: selesai,
                        evidence_link: link,
                        remarks: remarks,
                        status_approval: 'PENDING'
                    })
                });

                if(response.ok) {
                    alert("✅ Log Absen berhasil dikirim ke database! Menunggu approval Admin.");
                    document.getElementById('duty-link').value = '';
                    document.getElementById('duty-remarks').value = '';
                } else {
                    alert("Gagal mengirim log.");
                }
            } catch (error) { alert("Masalah koneksi database."); }
        }

        // FUNGSI SUBMIT CUTI
        async function submitCuti() {
            const start = document.getElementById('cuti-start').value;
            const end = document.getElementById('cuti-end').value;
            const remarks = document.getElementById('cuti-remarks').value.trim();

            if(!start || !end || !remarks) return alert("Mohon isi form cuti dengan lengkap!");

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/laporan_cuti`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nama_ic: user.nama_ic,
                        badge: user.badge,
                        tanggal_mulai: start,
                        tanggal_selesai: end,
                        remarks: remarks,
                        status_approval: 'PENDING'
                    })
                });

                if(response.ok) {
                    alert("✅ Pengajuan cuti berhasil dikirim!");
                    document.getElementById('cuti-remarks').value = '';
                } else { alert("Gagal mengirim izin cuti."); }
            } catch (error) { alert("Masalah koneksi."); }
        }

        function handleLogout() {
            localStorage.removeItem('session_pdmk');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
