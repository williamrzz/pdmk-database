<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDMK DATABASE - LOGIN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Gaya Neo-Brutalism Khas Panel Game */
        .brutal-box {
            background: #ffffff;
            border: 3px solid #000000;
            box-shadow: 5px 5px 0px 0px #000000;
        }
        .brutal-btn {
            background: #1C2541;
            color: #ffffff;
            border: 3px solid #000000;
            box-shadow: 4px 4px 0px 0px #000000;
            transition: all 0.1s ease;
        }
        .brutal-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px #000000;
        }
    </style>
</head>
<body class="bg-[#E2E8F0] min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md p-6 brutal-box rounded-lg">
        <div class="text-center mb-6">
            <span class="text-xs font-bold uppercase tracking-widest text-gray-500">Mandalika PD</span>
            <h1 class="text-2xl font-black italic text-[#1C2541]">PDMK DATABASE</h1>
        </div>

        <div id="login-section">
            <h2 class="text-lg font-bold mb-4 uppercase tracking-wider text-gray-700">🔐 Personnel Login</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Nama IC (Gunakan Underscore _)</label>
                    <input type="text" id="login-name" placeholder="Contoh: Lucaos_Voldemort" class="w-full p-2.5 border-3 border-black font-semibold focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••" class="w-full p-2.5 border-3 border-black font-semibold focus:outline-none">
                </div>
                <button onclick="handleLogin()" class="w-full py-3 brutal-btn font-bold uppercase tracking-wider cursor-pointer mt-2">Sign In</button>
            </div>
            <p class="text-xs text-center font-semibold mt-4 text-gray-600">
                Belum terdaftar? <span onclick="switchForm('register')" class="text-blue-600 cursor-pointer underline">Daftar Akun UCP</span>
            </p>
        </div>

        <div id="register-section" class="hidden">
            <h2 class="text-lg font-bold mb-4 uppercase tracking-wider text-gray-700">📝 UCP Registration</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Nama IC Sesuai Game</label>
                    <input type="text" id="reg-name" placeholder="Contoh: Marcus_Broody" class="w-full p-2.5 border-3 border-black font-semibold focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Nomor Badge (Pakai #)</label>
                    <input type="text" id="reg-badge" placeholder="Contoh: #06211" class="w-full p-2.5 border-3 border-black font-semibold focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase mb-1">Password</label>
                    <input type="password" id="reg-pass" placeholder="••••••••" class="w-full p-2.5 border-3 border-black font-semibold focus:outline-none">
                </div>
                <button onclick="handleRegister()" class="w-full py-3 brutal-btn font-bold uppercase tracking-wider cursor-pointer mt-2">Submit Register</button>
            </div>
            <p class="text-xs text-center font-semibold mt-4 text-gray-600">
                Sudah punya akun? <span onclick="switchForm('login')" class="text-blue-600 cursor-pointer underline">Login Personnel</span>
            </p>
        </div>
    </div>

    <script>
        // ISI DENGAN DATA SUPABASE KAMU YANG TADI
        const SUPABASE_URL = "https://yizoloveqztkgrlxdnvq.supabase.co";
        const SUPABASE_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpem9sb3ZlcXp0a2dybHhkbnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjA1MzIsImV4cCI6MjA5OTE5NjUzMn0.3nMMr8x0IS1U-KJvB6Z0QPcsr598k7jBjQYzMmBbXMA";

        // Fungsi Switch Form
        function switchForm(type) {
            if (type === 'register') {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('register-section').classList.remove('hidden');
            } else {
                document.getElementById('register-section').classList.add('hidden');
                document.getElementById('login-section').classList.remove('hidden');
            }
        }

        // FUNGSI DAFTAR (REGISTER)
        async function handleRegister() {
            const nama = document.getElementById('reg-name').value.trim();
            const badge = document.getElementById('reg-badge').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();

            if(!nama || !badge || !pass) return alert("Wajib mengisi seluruh kolom pendaftaran!");
            if(!nama.includes('_')) return alert("Nama IC wajib menggunakan format nama depan dan belakang dipisah underscore! (Contoh: Jhon_Doe)");

            // Kirim ke database roster_personel
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/roster_personel`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        nama_ic: nama,
                        badge: badge,
                        password: pass,
                        pangkat: 'BHARADA',
                        gaji_pokok: 100000,
                        is_admin: false,
                        status_akun: 'PENDING'
                    })
                });

                if (response.ok) {
                    alert("Pendaftaran UCP Berhasil! Status Anda PENDING. Silakan hubungi Jendral/High Command untuk aktivasi.");
                    switchForm('login');
                } else {
                    const errData = await response.json();
                    alert("Gagal daftar: " + errData.message);
                }
            } catch (error) {
                alert("Terjadi masalah koneksi database.");
            }
        }

        // FUNGSI MASUK (LOGIN)
        async function handleLogin() {
            const nama = document.getElementById('login-name').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if(!nama || !pass) return alert("Masukkan Nama IC dan Password!");

            try {
                // Cari data ke Supabase
                const response = await fetch(`${SUPABASE_URL}/rest/v1/roster_personel?nama_ic=eq.${nama}&password=eq.${pass}`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                const data = await response.json();

                if (data.length > 0) {
                    const user = data[0];
                    if (user.status_akun === 'PENDING') {
                        alert("🚨 Akun Anda masih PENDING! Silakan minta High Command/Jendral untuk mengubah status akun Anda menjadi ACTIVE.");
                    } else {
                        alert(`Selamat Datang, ${user.nama_ic} [${user.pangkat}]!`);
                        // Simpan sesi login sederhana di HP
                        localStorage.setItem('session_pdmk', JSON.stringify(user));
                        // Nanti diarahkan ke halaman dashboard utama
                        // window.location.href = 'dashboard.html';
                    }
                } else {
                    alert("Nama IC atau Password salah / Tidak ditemukan!");
                }
            } catch (error) {
                alert("Masalah koneksi database saat login.");
            }
        }
    </script>
</body>
  </html>
