<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>PDMK DATABASE</title>

    <meta
        name="description"
        content="PDMK Database - Personnel Management System"
    >

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="css/login.css"
    >

</head>

<body>

    <!-- Background -->

    <div class="background-glow"></div>

    <!-- Container -->

    <div class="container">

        <!-- Login Card -->

        <div class="login-card">

            <!-- Logo -->

            <div class="logo">

                <img
                    src="assets/logo.png"
                    alt="Logo PDMK"
                >

            </div>

            <!-- Header -->

            <div class="header">

                <h1>PDMK DATABASE</h1>

                <p>
                    Personnel Management System
                </p>

            </div>

            <!-- Login Form -->

            <div
                class="form-container"
                id="login-form"
            >

                <h2>Login</h2>

                <div class="input-group">

                    <label for="login-name">
                        Nama IC
                    </label>

                    <input
                        type="text"
                        id="login-name"
                        placeholder="Contoh : Marcus_Broody"
                    >

                </div>

                <div class="input-group">

                    <label for="login-password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="login-password"
                        placeholder="Masukkan Password"
                    >

                </div>

                <button
                    id="login-button"
                    class="btn-primary"
                >
                    Login
                </button>

                <div class="form-footer">

                    <span>
                        Belum memiliki akun?
                    </span>

                    <a
                        href="#"
                        id="show-register"
                    >
                        Daftar
                    </a>

                </div>

            </div>
                        <!-- Register Form -->

            <div
                class="form-container hidden"
                id="register-form"
            >

                <h2>Registrasi</h2>

                <div class="input-group">

                    <label for="register-name">
                        Nama IC
                    </label>

                    <input
                        type="text"
                        id="register-name"
                        placeholder="Contoh : Marcus_Broody"
                    >

                </div>

                <div class="input-group">

                    <label for="register-badge">
                        Badge
                    </label>

                    <input
                        type="text"
                        id="register-badge"
                        placeholder="Contoh : #06104"
                    >

                </div>

                <div class="input-group">

                    <label for="register-password">
                        Password
                    </label>

                    <input
                        type="password"
                        id="register-password"
                        placeholder="Masukkan Password"
                    >

                </div>

                <div class="input-group">

                    <label for="register-confirm-password">
                        Konfirmasi Password
                    </label>

                    <input
                        type="password"
                        id="register-confirm-password"
                        placeholder="Ulangi Password"
                    >

                </div>

                <button
                    id="register-button"
                    class="btn-primary"
                >
                    Daftar
                </button>

                <div class="form-footer">

                    <span>
                        Sudah memiliki akun?
                    </span>

                    <a
                        href="#"
                        id="show-login"
                    >
                        Login
                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- Javascript -->

    <script src="js/config.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/app.js"></script>

</script>

</body>

    </html>
