<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PDMK Login</title><script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script><style>body{background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a)}.card{background:rgba(15,23,42,.82);backdrop-filter:blur(14px)}input{background:#0f172a;border:1px solid #334155;color:#fff}.btn{background:#2563eb}</style></head><body class="min-h-screen flex items-center justify-center p-6 text-white"><div class="card rounded-3xl max-w-md w-full p-8"><h1 class="text-3xl font-bold mb-2">PDMK DATABASE</h1><p class="text-slate-400 mb-6">Personnel Login</p><input id="login-name" class="w-full rounded-xl px-4 py-3 mb-3" placeholder="Nama IC"><input id="login-pass" type="password" class="w-full rounded-xl px-4 py-3 mb-4" placeholder="Password"><button onclick="handleLogin()" class="btn w-full rounded-xl py-3 font-bold">LOGIN</button><hr class="my-6"><input id="reg-name" class="w-full rounded-xl px-4 py-3 mb-3" placeholder="Nama IC"><input id="reg-badge" class="w-full rounded-xl px-4 py-3 mb-3" placeholder="#00001"><input id="reg-pass" type="password" class="w-full rounded-xl px-4 py-3 mb-4" placeholder="Password"><button onclick="handleRegister()" class="btn w-full rounded-xl py-3 font-bold">REGISTER</button></div><script>const SUPABASE_URL='https://yizoloveqztkgrlxdnvq.supabase.co';const SUPABASE_KEY='GANTI_DENGAN_ANON_KEY_MILIKMU';async function handleLogin(){const n=document.getElementById('login-name').value.trim(),p=document.getElementById('login-pass').value.trim();const r=await fetch(`${SUPABASE_URL}/rest/v1/roster_personel?nama_ic=eq.${encodeURIComponent(n)}&password=eq.${encodeURIComponent(p)}`,{headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}});const d=await r.json();if(!d.length){alert('Login gagal');return;}localStorage.setItem('session_pdmk',JSON.stringify(d[0]));location.href='dashboard.html';}async function handleRegister(){const body={nama_ic:reg-name.value.trim(),badge:reg-badge.value.trim(),password:reg-pass.value.trim(),pangkat:'BHARADA',gaji_pokok:100000,is_admin:false,status_akun:'PENDING'};const r=await fetch(`${SUPABASE_URL}/rest/v1/roster_personel`,{method:'POST',headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(body)});alert(r.ok?'Pendaftaran berhasil':'Pendaftaran gagal');}</script></body></html>
