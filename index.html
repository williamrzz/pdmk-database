<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>PDMK DATABASE</title>

    <!-- Tailwind CSS -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{

            min-height:100vh;

            background:
            linear-gradient(
            135deg,
            #020617,
            #0f172a,
            #1e3a8a);

            display:flex;

            justify-content:center;

            align-items:center;

            padding:30px;

            overflow:hidden;

        }

        .background{

            position:fixed;

            width:100%;

            height:100%;

            top:0;

            left:0;

            overflow:hidden;

            z-index:-1;

        }

        .circle{

            position:absolute;

            border-radius:50%;

            filter:blur(80px);

            opacity:.18;

        }

        .circle:nth-child(1){

            width:350px;

            height:350px;

            background:#2563eb;

            top:-100px;

            left:-100px;

        }

        .circle:nth-child(2){

            width:300px;

            height:300px;

            background:#3b82f6;

            bottom:-80px;

            right:-80px;

        }

        .login-card{

            width:100%;

            max-width:1100px;

            min-height:650px;

            background:rgba(15,23,42,.80);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.08);

            border-radius:25px;

            display:flex;

            overflow:hidden;

            box-shadow:
            0 30px 80px rgba(0,0,0,.45);

        }

        .left{

            width:45%;

            background:
            linear-gradient(
            180deg,
            rgba(37,99,235,.9),
            rgba(15,23,42,.95));

            display:flex;

            flex-direction:column;

            justify-content:center;

            align-items:center;

            padding:50px;

        }

        .logo{

            width:180px;

            height:180px;

            border-radius:50%;

            background:white;

            padding:15px;

            margin-bottom:25px;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        .logo img{

            width:100%;

        }

        .left h1{

            color:white;

            font-size:34px;

            font-weight:800;

            margin-bottom:10px;

        }

        .left p{

            color:#dbeafe;

            text-align:center;

            line-height:28px;

        }

        .right{

            width:55%;

            padding:60px;

            color:white;

        }

        .title{

            font-size:34px;

            font-weight:700;

            margin-bottom:10px;

        }

        .subtitle{

            color:#94a3b8;

            margin-bottom:40px;

        }

        label{

            display:block;

            margin-bottom:8px;

            margin-top:20px;

            font-size:14px;

        }

        input{

            width:100%;

            padding:15px;

            border-radius:12px;

            border:1px solid #334155;

            background:#0f172a;

            color:white;

            font-size:15px;

        }

        input:focus{

            outline:none;

            border-color:#3b82f6;

        }

        .btn{

            width:100%;

            margin-top:30px;

            padding:16px;

            border:none;

            border-radius:12px;

            background:#2563eb;

            color:white;

            font-size:16px;

            font-weight:700;

            cursor:pointer;

            transition:.3s;

        }

        .btn:hover{

            background:#1d4ed8;

        }

        @media(max-width:900px){

            .login-card{

                flex-direction:column;

            }

            .left,
            .right{

                width:100%;

            }

            .left{

                padding:40px;

            }

        }

    </style>

</head>

<body>

<div class="background">

<div class="circle"></div>

<div class="circle"></div>

</div>

<div class="login-card">

<div class="left">

<!-- logo Mandalika  -->

<div class="logo">

<img src="assets/logo.png" alt="Logo">

</div>

<h1>PDMK DATABASE</h1>

<p>

Personnel Duty Management System

<br>

Polisi Mandalika

</p>

</div>

<div class="right">

<h2 class="title">

Selamat Datang

</h2>

<p class="subtitle">

Silakan login menggunakan akun personel.

</p>
<!-- LOGIN FORM -->

<div id="login-section">

    <div class="mb-5">

        <label>
            Nama IC
        </label>

        <input
            type="text"
            id="login-name"
            placeholder="Contoh : Marcus_Broody">

    </div>

    <div class="mb-2">

        <label>
            Password
        </label>

        <div
            style="
            position:relative;">

            <input
                type="password"
                id="login-pass"
                placeholder="Masukkan Password">

            <button
                type="button"
                onclick="togglePassword('login-pass',this)"
                style="
                position:absolute;
                right:15px;
                top:50%;
                transform:translateY(-50%);
                background:none;
                border:none;
                color:white;
                cursor:pointer;
                font-size:18px;">

                👁

            </button>

        </div>

    </div>

    <div
        style="
        display:flex;
        justify-content:space-between;
        margin-top:15px;
        font-size:14px;">

        <label>

            <input
                type="checkbox"
                style="
                width:auto;
                margin-right:8px;">

            Remember Me

        </label>

    </div>

    <button
        class="btn"
        onclick="handleLogin()">

        LOGIN

    </button>

    <p
        style="
        text-align:center;
        margin-top:30px;
        color:#94a3b8;">

        Belum punya akun?

        <span

            onclick="switchForm('register')"

            style="
            color:#60a5fa;
            cursor:pointer;
            font-weight:bold;">

            Daftar Sekarang

        </span>

    </p>

</div>

<!-- REGISTER -->

<div
id="register-section"

style="display:none;">

    <div class="
          <div class="mb-5">

        <label>
            Nama IC
        </label>

        <input
            type="text"
            id="reg-name"
            placeholder="Contoh : Marcus_Broody">

    </div>

    <div class="mb-5">

        <label>
            Badge
        </label>

        <input
            type="text"
            id="reg-badge"
            placeholder="#06211">

    </div>

    <div class="mb-5">

        <label>
            Password
        </label>

        <div style="position:relative;">

            <input
                type="password"
                id="reg-pass"
                placeholder="Masukkan Password">

            <button
                type="button"
                onclick="togglePassword('reg-pass',this)"
                style="
                    position:absolute;
                    right:15px;
                    top:50%;
                    transform:translateY(-50%);
                    background:none;
                    border:none;
                    color:white;
                    cursor:pointer;
                    font-size:18px;">

                👁

            </button>

        </div>

    </div>

    <button
        class="btn"
        onclick="handleRegister()">

        DAFTAR SEKARANG

    </button>

    <p
        style="
            text-align:center;
            margin-top:30px;
            color:#94a3b8;">

        Sudah mempunyai akun?

        <span

            onclick="switchForm('login')"

            style="
                color:#60a5fa;
                cursor:pointer;
                font-weight:bold;">

            Login Disini

        </span>

    </p>

</div>

<!-- TOAST -->

<div

    id="toast"

    style="
        position:fixed;
        top:30px;
        right:30px;
        background:#2563eb;
        color:white;
        padding:15px 25px;
        border-radius:10px;
        display:none;
        z-index:999;
        box-shadow:0 15px 40px rgba(0,0,0,.4);">

    Berhasil

</div>

<!-- LOADING -->

<div

    id="loading"

    style="
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.7);
        display:none;
        justify-content:center;
        align-items:center;
        z-index:9999;">

    <div

        style="
            width:60px;
            height:60px;
            border:6px solid rgba(255,255,255,.2);
            border-top:6px solid #3b82f6;
            border-radius:50%;
            animation:spin 1s linear infinite;">

    </div>

</div>

</div>

</div>

<script>
