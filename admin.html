<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKPD PANEL - HIGH COMMAND TEAM</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #12131a; color: #d1d5db; font-family: sans-serif; }
        .mandalika-card { background-color: #1a1b23; border: 2px solid #000000; box-shadow: 4px 4px 0px #000000; }
        .input-box { background-color: #e2e8f0; border: 2px solid #000000; color: #000; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-pill { padding: 6px 14px; text-transform: uppercase; font-size: 11px; font-weight: 800; border-radius: 6px; color: #fff; transition: all 0.2s; opacity: 0.4; border: 1px solid rgba(0,0,0,0.4); }
        .tab-pill.active { opacity: 1 !important; transform: scale(1.02); border: 2px solid #fff; }
    </style>
</head>
<body class="min-h-screen pb-12" onload="initPanel()">

    <!-- HEADER: MKPD PANEL -->
    <header class="bg-[#0A0B10] border-b-2 border-black px-4 py-3 sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div>
                <span class="block text-[9px] text-indigo-400 font-black uppercase tracking-wider">HIGH COMMAND TEAM</span>
                <span class="text-sm font-black text-white italic tracking-wide uppercase">MKPD PANEL</span>
            </div>
            <a href="dashboard.html" class="px-3 py-1 text-[10px] font-black uppercase tracking-wider bg-red-600 text-white border-2 border-black rounded-sm shadow-[2px_2px_0px_#000]">Exit</a>
        </div>
    </header>

    <!-- NAVIGATION BAR -->
    <div class="bg-[#16171e] border-b border-black py-3 px-4">
        <div class="max-w-4xl mx-auto flex items-center gap-2 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('tab-personnel')" id="btn-personnel" class="tab-pill active bg-[#059669] whitespace-nowrap cursor-pointer">👥 Personel</button>
            <button onclick="switchTab('tab-surat')" id="btn-surat" class="tab-pill bg-[#d97706] whitespace-nowrap cursor-pointer">✉️ Surat</button>
            <button onclick="switchTab('tab-whitelist')" id="btn-whitelist" class="tab-pill bg-[#4f46e5] whitespace-nowrap cursor-pointer">📝 Whitelist</button>
            
            <div class="h-5 w-[1px] bg-gray-700 mx-1"></div>
            
            <a href="admin_divisi.html" class="tab-pill bg-[#3b82f6] opacity-70 hover:opacity-100 whitespace-nowrap">🛡️ Divisi</a>
            <a href="admin_gaji.html" class="tab-pill bg-[#e11d48] opacity-70 hover:opacity-100 whitespace-nowrap">💰 Gaji</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="max-w-4xl mx-auto px-4 mt-6 space-y-6">

        <!-- TAB PERSONEL -->
        <div id="tab-personnel" class="tab-content space-y-4">
            <div class="flex flex-col sm:flex-row gap-3 items-center justify-between">
                <input type="text" id="search-personel" oninput="renderPersonel()" placeholder="Cari nama..." class="w-full sm:w-64 p-2 text-xs font-bold input-box rounded-sm">
            </div>
            <div class="grid grid-cols-1 gap-3" id="personel-container">
                <div id="loading-status" class="text-xs text-amber-400 animate-pulse font-mono p-4 bg-amber-500/10 border border-amber-500/30 rounded-sm">
                    🔄 Menghubungkan ke server...
                </div>
            </div>
        </div>

        <!-- TAB SURAT -->
        <div id="tab-surat" class="tab-content hidden space-y-4">
            <div class="mandalika-card p-4 rounded-sm">
                <h2 class="text-xs font-black text-white uppercase">✉️ Kategori Surat</h2>
            </div>
            <div class="grid grid-cols-1 gap-3" id="surat-container">
                <div class="text-xs text-gray-500 font-mono p-4">Memuat data...</div>
            </div>
        </div>

        <!-- TAB WHITELIST -->
        <div id="tab-whitelist" class="tab-content hidden space-y-4">
            <div class="mandalika-card p-4 rounded-sm">
                <h2 class="text-xs font-black text-white uppercase">📝 Kategori Whitelist</h2>
            </div>
            <div class="grid grid-cols-1 gap-3" id="whitelist-container">
                <div class="text-xs text-gray-500 font-mono p-4">Memuat data...</div>
            </div>
        </div>

    </main>

    <!-- MODAL MANAGE PERSONEL -->
    <div id="modal-manage" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="w-full max-w-sm p-5 bg-[#1a1b23] border-2 border-black rounded-sm space-y-4 shadow-2xl">
            <h3 class="text-xs font-black uppercase text-white">✏️ Kelola Anggota</h3>
            <input type="hidden" id="edit-id">
            <input type="hidden" id="current-pangkat">
            <div>
                <label class="block text-[9px] uppercase font-bold text-gray-400 mb-1">Nama</label>
                <input type="text" id="edit-nama" class="w-full p-2 input-box text-xs font-bold rounded-sm">
            </div>
            <div>
                <label class="block text-[9px] uppercase font-bold text-gray-400 mb-1">Pangkat</label>
                <select id="edit-pangkat" class="w-full p-2 bg-[#0c0d12] border border-black text-xs text-white rounded-sm font-bold">
                    <option value="BHARADA">BHARADA</option>
                    <option value="BHARATU">BHARATU</option>
                    <option value="BRIPDA">BRIPDA</option>
                    <option value="BRIPKA">BRIPKA</option>
                    <option value="AIPTU">AIPTU</option>
                    <option value="AKP">AKP</option>
                    <option value="KOMPOL">KOMPOL</option>
                    <option value="JENDRAL">JENDRAL</option>
                </select>
            </div>
            
            <div class="flex flex-col gap-2 pt-2">
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="w-1/2 py-2 bg-[#0c0d12] border border-black text-gray-400 font-bold text-[10px] uppercase rounded-sm cursor-pointer">Batal</button>
                    <button onclick="savePersonelChanges()" class="w-1/2 py-2 bg-emerald-600 text-white font-bold text-[10px] uppercase border border-black rounded-sm cursor-pointer">Simpan</button>
                </div>
                <button onclick="deletePersonel()" class="w-full py-2 bg-red-700 hover:bg-red-800 text-white font-black text-[10px] uppercase border border-black rounded-sm tracking-wider shadow-[2px_2px_0px_#000] cursor-pointer">⚠️ Hapus</button>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://yizoloveqztkgrlxdnvq.supabase.co";
        const DB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpem9sb3ZlcXp0a2dybHhkbnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjA1MzIsImV4cCI6MjA5OTE5NjUzMn0.3nMMr8x0IS1U-KJvB6Z0QPcsr598k7jBjQYzMmBbXMA";
        const DISCORD_PAYROLL_WEBHOOK = "https://discord.com/api/webhooks/1486137739022700634/m9pjXqS2G9DV8L8DcHgIVG5I1yriyRwYAECguI6Tw3v2S-t5isC9r_5x13zCu-VxT";

        const BASE_HEADERS = {
            'apikey': DB_KEY,
            'Authorization': `Bearer ${DB_KEY}`,
            'Content-Type': 'application/json'
        };

        let rosterData = [], suratData = [];

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-pill').forEach(el => el.classList.remove('active'));
            
            const targetTab = document.getElementById(tabId);
            if(targetTab) targetTab.classList.remove('hidden');

            if(tabId === 'tab-personnel') document.getElementById('btn-personnel').classList.add('active');
            if(tabId === 'tab-surat') document.getElementById('btn-surat').classList.add('active');
            if(tabId === 'tab-whitelist') document.getElementById('btn-whitelist').classList.add('active');
        }

        async function initPanel() {
            const statusEl = document.getElementById('loading-status');
            try {
                const rRes = await fetch(`${DB_URL}/rest/v1/roster_personel`, { headers: { 'apikey': DB_KEY } });
                if(rRes.ok) { 
                    rosterData = await rRes.json(); 
                } else { 
                    if(statusEl) statusEl.innerHTML = "❌ Error 401";
                    return;
                }
            } catch(e) { 
                if(statusEl) statusEl.innerHTML = "❌ Error Jaringan";
                return;
            }

            try {
                const sRes = await fetch(`${DB_URL}/rest/v1/laporan_cuti?status_approval=eq.PENDING`, { headers: { 'apikey': DB_KEY } });
                if(sRes.ok) { suratData = await sRes.json(); }
            } catch(e) {}
            
            renderPersonel();
            renderSurat();
            renderWhitelist();
        }

        function renderSurat() {
    const container = document.getElementById('surat-container');
    if(!container) return;
    container.innerHTML = '';
    
    if(!Array.isArray(suratData) || suratData.length === 0) {
        container.innerHTML = `<div class="mandalika-card p-4 text-center text-xs text-gray-500 font-mono">Tidak ada data.</div>`;
        return;
    }
    suratData.forEach(s => {
        if(!s) return;
        container.innerHTML += `
            <div class="mandalika-card p-4 rounded-sm space-y-2">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="px-1.5 py-0.5 text-[9px] font-black bg-amber-600 text-black rounded-sm uppercase">${s.jenis_surat || 'SURAT'}</span>
                        <h4 class="font-black text-white text-xs uppercase mt-1">${s.nama_ic}</h4>
                    </div>
                </div>
                <div class="flex justify-end gap-2 pt-1">
                    <button onclick="prosesSurat('${s.id}', 'DENIED')" class="px-3 py-1 bg-red-700 text-white text-[10px] font-bold border border-black rounded-sm cursor-pointer">DENIED</button>
                    <button onclick="prosesSurat('${s.id}', 'APPROVED')" class="px-3 py-1 bg-emerald-600 text-white text-[10px] font-bold border border-black rounded-sm cursor-pointer">ACC</button>
                </div>
            </div>`;
    });
}

            let list = rosterData
                .filter(p => p && p.nama_ic && String(p.status_akun).trim().toUpperCase() === 'ACTIVE' && 
                            (p.nama_ic.toLowerCase().includes(searchVal) || (p.pangkat && p.pangkat.toLowerCase().includes(searchVal))))
                .sort((a, b) => (b.total_jam_duty || 0) - (a.total_jam_duty || 0));

            if(list.length === 0) {
                container.innerHTML = `<div class="mandalika-card p-4 text-center text-xs text-gray-500 font-mono">Tidak ada data.</div>`;
                return;
            }

            list.forEach(p => {
                container.innerHTML += `
                    <div class="mandalika-card p-4 rounded-sm flex items-center justify-between gap-3">
                        <div>
                            <div class="flex items-center space-x-2">
                                <h4 class="font-black text-white text-sm uppercase tracking-wide">${p.nama_ic}</h4>
                                <span class="text-[9px] font-mono bg-black text-gray-400 px-1 rounded-sm">#${p.badge || '00'}</span>
                            </div>
                            <p class="text-[10px] text-gray-400 font-mono mt-0.5 uppercase">${p.pangkat || ''} — ⏱️ ${p.total_jam_duty || 0} JAM</p>
                        </div>
                        <button onclick="openManageModal('${p.id}', '${p.nama_ic}', '${p.pangkat || ''}')" class="px-3 py-1.5 bg-[#0c0d12] text-gray-300 text-[10px] font-bold border border-black rounded-sm shadow-[2px_2px_0px_#000] cursor-pointer">MANAGE</button>
                    </div>`;
            });
        }

        function openManageModal(id, nama, pangkat) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-nama').value = nama;
            document.getElementById('edit-pangkat').value = pangkat;
            document.getElementById('current-pangkat').value = pangkat;
            document.getElementById('modal-manage').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-manage').classList.add('hidden'); }

        async function savePersonelChanges() {
            const id = document.getElementById('edit-id').value;
            const namaBaru = document.getElementById('edit-nama').value.trim();
            const pangkatBaru = document.getElementById('edit-pangkat').value;
            const pangkatLama = document.getElementById('current-pangkat').value;

            if(!namaBaru) return;

            let payload = { nama_ic: namaBaru, pangkat: pangkatBaru };
            if(pangkatBaru !== pangkatLama) {
                payload.total_jam_duty = 0;
            }

            try {
                const res = await fetch(`${DB_URL}/rest/v1/roster_personel?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { ...BASE_HEADERS, 'Prefer': 'return=representation' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) { closeModal(); initPanel(); }
            } catch (e) {}
        }

        async function deletePersonel() {
            const id = document.getElementById('edit-id').value;
            if(!confirm(`Hapus?`)) return;
            try {
                const res = await fetch(`${DB_URL}/rest/v1/roster_personel?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: BASE_HEADERS
                });
                if(res.ok) { closeModal(); initPanel(); }
            } catch (e) {}
        }

        function renderSurat() {
            const container = document.getElementById('surat-container');
            if(!container) return;
            container.innerHTML = '';
            
            if(!Array.isArray(suratData) || suratData.length === 0) {
                container.innerHTML = `<div class="mandalika-card p-4 text-center text-xs text-gray-500 font-mono">Tidak ada data.</div>`;
                return;
            }
            suratData.forEach(s => {
                if(!s) return;
                container.innerHTML += `
                    <div class="mandalika-card p-4 rounded-sm space-y-2">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="px-1.5 py-0.5 text-[9px] font-black bg-amber-600 text-black rounded-sm uppercase">${s.jenis_surat || 'SURAT'}</span>
                                <h4 class="font-black text-white text-xs uppercase mt-1">${s.nama_ic}</h4>
                            </div>
                        </div>
                        <div class="flex justify-end gap-2 pt-1">
                            <button onclick="prosesSurat('${s.id}', 'DENIED')" class="px-3 py-1 bg-red-700 text-white text-[10px] font-bold border border-black rounded-sm cursor-pointer">DENIED</button>
                            <button onclick="prosesSurat('${s.id}', 'APPROVED')" class="px-3 py-1 bg-emerald-600 text-white text-[10px] font-bold border border-black rounded-sm cursor-pointer">ACC</button>
                        </div>
                    </div>`;
            });
        }

        async function prosesSurat(id, status) {
    if (!id || !status) return;
    try {
        const res = await fetch(`${DB_URL}/rest/v1/laporan_cuti?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 
                ...BASE_HEADERS, 
                'Prefer': 'return=minimal' 
            },
            body: JSON.stringify({ 
                status_approval: status.toUpperCase() 
            })
        });
        if (res.ok) { 
            initPanel(); 
        } else {
            console.error("Gagal update status surat.");
        }
    } catch (e) {
        console.error("Error sistem surat.");
    }
}


        function renderWhitelist() {
            const container = document.getElementById('whitelist-container');
            if(!container) return;
            container.innerHTML = '';
            
            if(!Array.isArray(rosterData)) return;
            let pendingList = rosterData.filter(p => p && String(p.status_akun).trim().toUpperCase() === 'PENDING');

            if(pendingList.length === 0) {
                container.innerHTML = `<div class="mandalika-card p-4 text-center text-xs text-gray-500 font-mono">Tidak ada data.</div>`;
                return;
            }

            pendingList.forEach(p => {
                container.innerHTML += `
                    <div class="mandalika-card p-4 rounded-sm flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                        <div>
                            <h4 class="font-black text-indigo-400 text-sm uppercase tracking-wide">${p.nama_ic}</h4>
                        </div>
                        <div class="flex gap-2 justify-end">
                            <button onclick="rejectWhitelist('${p.id}')" class="px-3 py-1.5 bg-red-700 text-white text-[10px] font-black border border-black rounded-sm cursor-pointer">DENIED</button>
                            <button onclick="accWhitelist('${p.id}')" class="px-4 py-1.5 bg-indigo-600 text-white text-[10px] font-black border border-black rounded-sm cursor-pointer">ACC</button>
                        </div>
                    </div>`;
            });
        }

        async function accWhitelist(id) {
    if (!id) return;
    try {
        const res = await fetch(`${DB_URL}/rest/v1/roster_personel?id=eq.${id}`, {
            method: 'PATCH',
            headers: { 
                ...BASE_HEADERS, 
                'Prefer': 'return=minimal' 
            },
            body: JSON.stringify({ 
                status_akun: 'ACTIVE', 
                total_jam_duty: 0 
            })
        });
        if (res.ok) { 
            initPanel(); 
        } else {
            console.error("Gagal update status.");
        }
    } catch(e) {
        console.error("Error sistem whitelist.");
    }
}

        async function rejectWhitelist(id) {
            if(!confirm(`Hapus?`)) return;
            try {
                const res = await fetch(`${DB_URL}/rest/v1/roster_personel?id=eq.${id}`, { method: 'DELETE', headers: BASE_HEADERS });
                if(res.ok) { initPanel(); }
            } catch(e) {}
        }
    </script>
</body>
    </html>
