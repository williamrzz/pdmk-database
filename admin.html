<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANDALIKA PD - PERSONNEL DATABASE</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { background-color: #1a1a1a; color: #d1d5db; font-family: sans-serif; }
        .mandalika-card { background-color: #242424; border: 2px solid #000000; box-shadow: 4px 4px 0px #000000; }
        .mandalika-btn { background-color: #12131a; border: 2px solid #000000; box-shadow: 3px 3px 0px #000000; color: #fff; transition: all 0.1s ease; }
        .mandalika-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #000000; }
        .input-box { background-color: #e2e8f0; border: 2px solid #000000; color: #000; }
        .tab-sub.active { background-color: #fff; color: #000; border: 2px solid #000; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen pb-12" onload="initAdminPanel()">

    <nav class="bg-[#0A0B10] border-b-2 border-black px-4 py-3 sticky top-0 z-50 shadow-md">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-3">
            <div>
                <span class="block text-[8px] text-gray-500 font-bold uppercase tracking-wider">MANDALIKA PD</span>
                <span class="text-xs font-black text-white italic tracking-wide uppercase">PDMK DATABASE</span>
            </div>
            <div class="flex items-center space-x-3 overflow-x-auto no-scrollbar py-1">
                <a href="admin.html" class="px-2 py-0.5 text-[9px] bg-white text-black font-black uppercase border border-black rounded-sm">Personnel</a>
                <a href="divisi.html" class="text-[9px] text-gray-400 hover:text-white font-bold uppercase">Divisi</a>
                <a href="laporan.html" class="text-[9px] text-gray-400 hover:text-white font-bold uppercase">Laporan</a>
                <a href="finance.html" class="text-[9px] text-gray-400 hover:text-white font-bold uppercase">Finance</a>
                <a href="system.html" class="text-[9px] text-purple-400 hover:text-purple-300 font-bold uppercase">System</a>
            </div>
            <a href="dashboard.html" class="px-2.5 py-1 text-[9px] font-black uppercase tracking-wider bg-red-600 hover:bg-red-700 text-white border border-black rounded-sm shadow-[2px_2px_0px_#000]">
                Exit
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-6 space-y-6">

        <div class="flex space-x-1 border-b border-black pb-2">
            <button onclick="switchSubTab('sub-anggota')" id="btn-sub-anggota" class="tab-sub active px-4 py-1.5 text-[10px] uppercase tracking-wider rounded-sm cursor-pointer">👥 Data Anggota</button>
            <button onclick="switchSubTab('sub-cuti')" id="btn-sub-cuti" class="tab-sub px-4 py-1.5 text-[10px] uppercase tracking-wider rounded-sm cursor-pointer">📝 Pengajuan Cuti</button>
            <button onclick="switchSubTab('sub-absensi')" id="btn-sub-absensi" class="tab-sub px-4 py-1.5 text-[10px] uppercase tracking-wider rounded-sm cursor-pointer">📊 Rekap Absensi</button>
        </div>

        <div id="sub-anggota" class="sub-content space-y-4">
            <div class="flex flex-col sm:flex-row gap-3 items-center justify-between">
                <input type="text" id="search-input" oninput="filterRoster()" placeholder="Cari Nama atau Pangkat..." class="w-full sm:w-64 p-2 text-xs font-bold input-box rounded-sm placeholder-gray-600">
                <button onclick="downloadExcelData()" class="mandalika-btn px-4 py-2 text-[10px] font-bold uppercase tracking-wider rounded-sm cursor-pointer">📥 Export Data Excel</button>
            </div>
            <div class="grid grid-cols-1 gap-3" id="roster-list-container">
                </div>
        </div>

        <div id="sub-cuti" class="sub-content hidden space-y-4">
            <div class="mandalika-card p-4 rounded-sm">
                <span class="text-[10px] font-bold text-gray-400 block uppercase">LEAVE MANAGEMENT</span>
                <h2 class="text-xs font-black text-white uppercase mt-0.5">Daftar Permohonan Izin Cuti</h2>
            </div>
            <div class="space-y-3" id="cuti-list-container">
                </div>
        </div>

        <div id="sub-absensi" class="sub-content hidden space-y-4">
            <div class="mandalika-card p-4 flex justify-between items-center rounded-sm">
                <div>
                    <span class="text-[10px] font-bold text-gray-400 block uppercase">OPERATIONAL REKAP</span>
                    <h2 class="text-xs font-black text-white uppercase mt-0.5">Kehadiran Operasional Mingguan</h2>
                </div>
                <select id="absensi-mode" onchange="renderAbsensi()" class="p-1.5 bg-[#12131a] border border-black text-xs text-white rounded-sm">
                    <option value="LOG">⏱️ Lihat Jam Kerja</option>
                    <option value="STATUS">🚨 Lihat Status Singkat</option>
                </select>
            </div>
            <div class="bg-[#242424] border-2 border-black rounded-sm overflow-x-auto p-2">
                <table class="w-full text-left text-xs min-w-[600px] border-collapse">
                    <thead>
                        <tr class="border-b-2 border-black text-gray-400 text-[9px] uppercase tracking-wider">
                            <th class="py-2 px-2">Nama Personel</th>
                            <th class="py-2 px-2 text-center">Senin</th>
                            <th class="py-2 px-2 text-center">Selasa</th>
                            <th class="py-2 px-2 text-center">Rabu</th>
                            <th class="py-2 px-2 text-center">Kamis</th>
                            <th class="py-2 px-2 text-center">Jumat</th>
                        </tr>
                    </thead>
                    <tbody id="absensi-table-body" class="divide-y divide-black/40">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <div id="manage-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="w-full max-w-sm p-5 bg-[#242424] border-2 border-black rounded-sm space-y-4 shadow-2xl">
            <h3 class="text-xs font-black uppercase tracking-wider text-white">✏️ KELOLA PROFIL ANGGOTA</h3>
            <input type="hidden" id="modal-id">
            <div>
                <label class="block text-[9px] uppercase font-bold text-gray-400 mb-1">Nama Karakter IC</label>
                <input type="text" id="modal-nama" class="w-full p-2 input-box text-xs font-bold rounded-sm">
            </div>
            <div>
                <label class="block text-[9px] uppercase font-bold text-gray-400 mb-1">Pangkat</label>
                <select id="modal-pangkat" class="w-full p-2 bg-[#12131a] border border-black text-xs text-white rounded-sm font-bold">
                    <option value="BHARADA">BHARADA</option>
                    <option value="BHARATU">BHARATU</option>
                    <option value="BRIPDA">BRIPDA</option>
                    <option value="BRIPKA">BRIPKA</option>
                    <option value="AIPTU">AIPTU</option>
                    <option value="AKP">AKP</option>
                    <option value="KOMPOL">KOMPOL</option>
                    <option value="JENDRAL">JENDRAL</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[9px] uppercase font-bold text-gray-400 mb-1">Total Jam Kerja</label>
                    <input type="number" step="0.1" id="modal-jam" class="w-full p-2 input-box text-xs font-mono font-bold rounded-sm">
                </div>
                <div>
                    <label class="block text-[9px] uppercase font-bold text-gray-400 mb-1">Poin PRP</label>
                    <input type="number" id="modal-prp" class="w-full p-2 input-box text-xs font-mono font-bold rounded-sm">
                </div>
            </div>
            <div class="flex space-x-2 pt-2">
                <button onclick="closeModal()" class="w-1/2 py-2 bg-[#12131a] border border-black text-gray-400 font-bold text-[10px] uppercase rounded-sm">Batal</button>
                <button onclick="saveChanges()" class="w-1/2 py-2 bg-emerald-600 text-white font-bold text-[10px] uppercase border border-black rounded-sm">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://yizoloveqztkgrlxdnvq.supabase.co";
        const DB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpem9sb3ZlcXp0a2dybHhkbnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjA1MzIsImV4cCI6MjA5OTE5NjUzMn0.3nMMr8x0IS1U-KJvB6Z0QPcsr598k7jBjQYzMmBbXMA";

        let fullRoster = [], dutyLogs = [], leaveLogs = [];

        // Proteksi Akses Admin
        const session = localStorage.getItem('session_pdmk');
        const user = session ? JSON.parse(session) : null;
        if (!user || (user.is_admin !== true && user.is_admin !== "true")) {
            window.location.href = 'dashboard.html';
        }

        // Switcher Sub-Tab
        function switchSubTab(tabId) {
            document.querySelectorAll('.sub-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-sub').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.remove('hidden');
            document.getElementById(`btn-${tabId}`).classList.add('active');
        }

        // Fetch Data Awal
        async function initAdminPanel() {
            try {
                const [rRes, dRes, lRes] = await Promise.all([
                    fetch(`${DB_URL}/rest/v1/roster_personel?order=status_akun.desc,nama_ic.asc`, { headers: { 'apikey': DB_KEY } }),
                    fetch(`${DB_URL}/rest/v1/laporan_duty`, { headers: { 'apikey': DB_KEY } }),
                    fetch(`${DB_URL}/rest/v1/laporan_cuti`, { headers: { 'apikey': DB_KEY } })
                ]);
                fullRoster = await rRes.json();
                dutyLogs = await dRes.json();
                leaveLogs = await lRes.json();
                renderRoster(fullRoster);
                renderCuti();
                renderAbsensi();
            } catch (err) { alert("Sinkronisasi database gagal."); }
        }

        // Render List Personel
        function renderRoster(data) {
            const container = document.getElementById('roster-list-container');
            container.innerHTML = '';
            data.forEach(p => {
                const isPending = p.status_akun === 'PENDING';
                let btnAction = isPending
                    ? `<button onclick="approvePersonnel('${p.id}')" class="px-3 py-1.5 bg-emerald-600 text-white text-[10px] font-black border border-black rounded-sm shadow-[2px_2px_0px_#000] cursor-pointer">✓ SETUJUI AKUN</button>`
                    : `<button onclick="openModal('${p.id}','${p.nama_ic}','${p.pangkat}',${p.total_jam_duty || 0},${p.poin_prp || 0})" class="px-3 py-1.5 bg-[#12131a] text-gray-300 text-[10px] font-bold border border-black rounded-sm shadow-[2px_2px_0px_#000] cursor-pointer">KELOLA</button>`;
                let statusBadge = isPending 
                    ? `<span class="text-[8px] bg-amber-500/20 text-amber-500 border border-amber-500/40 px-1 rounded-sm font-bold uppercase ml-2">PENDING</span>`
                    : `<span class="text-[8px] bg-emerald-500/20 text-emerald-500 border border-emerald-500/40 px-1 rounded-sm font-bold uppercase ml-2">ACTIVE</span>`;

                container.innerHTML += `
                    <div class="mandalika-card p-4 rounded-sm flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                        <div>
                            <div class="flex items-center space-x-2">
                                <h4 class="font-black text-white text-sm uppercase tracking-wide">${p.nama_ic}</h4>
                                <span class="text-[9px] font-mono bg-black text-gray-400 px-1 rounded-sm">#${p.badge}</span>
                                ${statusBadge}
                            </div>
                            <p class="text-[10px] text-gray-400 font-mono mt-0.5 uppercase">${p.pangkat} — ⏱️ ${p.total_jam_duty || 0} Jam Kerja — 🚨 Poin PRP: ${p.poin_prp || 0}</p>
                        </div>
                        <div class="w-full sm:w-auto flex justify-end">${btnAction}</div>
                    </div>
                `;
            });
        }

        function filterRoster() {
            const val = document.getElementById('search-input').value.toLowerCase();
            const filtered = fullRoster.filter(p => p.nama_ic.toLowerCase().includes(val) || p.pangkat.toLowerCase().includes(val));
            renderRoster(filtered);
        }

        // Render Management Cuti
        function renderCuti() {
            const container = document.getElementById('cuti-list-container');
            container.innerHTML = '';
            const pending = leaveLogs.filter(l => l.status_approval === 'PENDING');
            if (pending.length === 0) {
                container.innerHTML = `<div class="mandalika-card p-4 text-center text-xs text-gray-500 font-mono">Tidak ada permohonan cuti tertunda.</div>`;
                return;
            }
            pending.forEach(c => {
                container.innerHTML += `
                    <div class="mandalika-card p-4 rounded-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                        <div>
                            <span class="font-black text-white text-xs block uppercase">${c.nama_ic} (#${c.badge})</span>
                            <p class="text-[10px] text-gray-400 italic mt-1">" ${c.remarks} "</p>
                            <span class="text-[9px] text-amber-500 block font-mono mt-0.5">📅 Rentang: ${c.tanggal_mulai} s/d ${c.tanggal_selesai}</span>
                        </div>
                        <div class="flex space-x-2 w-full sm:w-auto justify-end">
                            <button onclick="updateStatusCuti('${c.id}', 'DENIED')" class="px-3 py-1 bg-red-700 text-white text-[10px] font-bold border border-black rounded-sm shadow-[2px_2px_0px_#000]">TOLAK</button>
                            <button onclick="updateStatusCuti('${c.id}', 'APPROVED')" class="px-3 py-1 bg-emerald-600 text-white text-[10px] font-bold border border-black rounded-sm shadow-[2px_2px_0px_#000]">TERIMA</button>
                        </div>
                    </div>
                `;
            });
        }

        async function updateStatusCuti(id, status) {
            try {
                const res = await fetch(`${DB_URL}/rest/v1/laporan_cuti?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': DB_KEY, 'Authorization': `Bearer ${DB_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status_approval: status })
                });
                if (res.ok) { initAdminPanel(); }
            } catch (e) { alert("Gagal update status cuti."); }
        }

        // Render Tabel Absensi Mingguan
        function renderAbsensi() {
            const tbody = document.getElementById('absensi-table-body');
            const mode = document.getElementById('absensi-mode').value;
            tbody.innerHTML = '';
            const hariKerja = ['2026-07-06', '2026-07-07', '2026-07-08', '2026-07-09', '2026-07-10'];

            fullRoster.filter(p => p.status_akun === 'ACTIVE').forEach(p => {
                let tr = `<tr><td class="py-2.5 px-2 font-bold text-white text-xs">${p.nama_ic}<span class="block text-[8px] font-normal font-mono text-gray-500 uppercase">${p.pangkat}</span></td>`;
                hariKerja.forEach(tgl => {
                    const logs = dutyLogs.filter(d => d.nama_ic === p.nama_ic && d.tanggal === tgl);
                    const isCuti = leaveLogs.some(l => l.nama_ic === p.nama_ic && l.status_approval === 'APPROVED' && tgl >= l.tanggal_mulai && tgl <= l.tanggal_selesai);
                    let display = "";
                    if (logs.length > 0) {
                        let totalJam = 0;
                        logs.forEach(l => {
                            if (l.jam_mulai && l.jam_selesai) {
                                let diff = (new Date(`${tgl}T${l.jam_selesai}`) - new Date(`${tgl}T${l.jam_mulai}`)) / 1000 / 60 / 60;
                                if (diff > 0) totalJam += diff;
                            }
                        });
                        display = mode === 'LOG' ? `<span class="text-emerald-400 font-bold font-mono">${totalJam.toFixed(1)}h</span>` : `<span class="px-1.5 py-0.5 bg-emerald-600 text-black font-black text-[8px] rounded-sm uppercase">DUTY</span>`;
                    } else if (isCuti) {
                        display = `<span class="px-1.5 py-0.5 bg-amber-500 text-black font-bold text-[8px] rounded-sm uppercase">CUTI</span>`;
                    } else {
                        display = `<span class="px-1.5 py-0.5 bg-red-700 text-white font-bold text-[8px] rounded-sm uppercase">ALPHA</span>`;
                    }
                    tr += `<td class="py-2.5 px-2 text-center">${display}</td>`;
                });
                tr += `</tr>`;
                tbody.innerHTML += tr;
            });
        }

        // Modal Form Controller
        function openModal(id, name, pangkat, jam, poin) {
            document.getElementById('modal-id').value = id;
            document.getElementById('modal-nama').value = name;
            document.getElementById('modal-pangkat').value = pangkat;
            document.getElementById('modal-jam').value = jam;
            document.getElementById('modal-prp').value = poin;
            document.getElementById('manage-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('manage-modal').classList.add('hidden'); }

        async function saveChanges() {
            const id = document.getElementById('modal-id').value;
            const nama = document.getElementById('modal-nama').value.trim();
            const pangkat = document.getElementById('modal-pangkat').value;
            const jam = parseFloat(document.getElementById('modal-jam').value) || 0;
            const prp = parseInt(document.getElementById('modal-prp').value) || 0;
            if(!nama) return alert("Nama tidak valid");
            try {
                const res = await fetch(`${DB_URL}/rest/v1/roster_personel?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': DB_KEY, 'Authorization': `Bearer ${DB_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nama_ic: nama, pangkat: pangkat, total_jam_duty: jam, poin_prp: prp })
                });
                if (res.ok) { closeModal(); initAdminPanel(); }
            } catch (e) { alert("Gagal memperbarui database."); }
        }

        async function approvePersonnel(id) {
            try {
                const res = await fetch(`${DB_URL}/rest/v1/roster_personel?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': DB_KEY, 'Authorization': `Bearer ${DB_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status_akun: 'ACTIVE', total_jam_duty: 0, poin_prp: 0 })
                });
                if (res.ok) { initAdminPanel(); }
            } catch (e) { alert("Gagal verifikasi pendaftaran.
