<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANDALIKA PD - REGISTRATION</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #1a1a1a; color: #d1d5db; font-family: sans-serif; }
        .mandalika-card { background-color: #242424; border: 2px solid #000000; box-shadow: 4px 4px 0px #000000; }
        .mandalika-btn { background-color: #12131a; border: 2px solid #000000; box-shadow: 3px 3px 0px #000000; color: #fff; transition: all 0.1s ease; }
        .mandalika-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #000000; }
        .input-box { background-color: #e2e8f0; border: 2px solid #000000; color: #000; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-12">

    <div class="w-full max-w-md mandalika-card p-6 space-y-6">
        <div class="text-center border-b-2 border-black pb-4">
            <span class="block text-[9px] text-gray-500 font-bold uppercase tracking-wider">MANDALIKA DATABASE</span>
            <h1 class="text-base font-black text-white italic uppercase tracking-wide">PENDAFTARAN AKUN PERSONEL</h1>
            <p class="text-[10px] text-gray-400 mt-1">Isi data karakter IC dengan benar untuk verifikasi Admin</p>
        </div>

        <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4">
            <div>
                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Nama Karakter IC (Sesuai Paspor)</label>
                <input type="text" id="reg-nama" required placeholder="Contoh: Jhon_Doe" class="w-full p-2.5 text-xs font-bold input-box rounded-sm placeholder-gray-500">
            </div>

            <div>
                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Nomor Badge</label>
                <input type="number" id="reg-badge" required placeholder="Contoh: 102" class="w-full p-2.5 text-xs font-mono font-bold input-box rounded-sm placeholder-gray-500">
            </div>

            <div>
                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Pangkat / Jabatan Saat Ini</label>
                <select id="reg-pangkat" required class="w-full p-2.5 bg-[#12131a] border-2 border-black text-xs text-white rounded-sm font-bold">
                    <option value="BHARADA">BHARADA</option>
                    <option value="BHARATU">BHARATU</option>
                    <option value="BRIPDA">BRIPDA</option>
                    <option value="BRIPKA">BRIPKA</option>
                    <option value="AIPTU">AIPTU</option>
                    <option value="AKP">AKP</option>
                    <option value="KOMPOL">KOMPOL</option>
                    <option value="JENDRAL">JENDRAL</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] uppercase font-bold text-gray-400 mb-1">Kata Sandi Akun</label>
                <input type="password" id="reg-password" required placeholder="••••••••" class="w-full p-2.5 text-xs font-bold input-box rounded-sm placeholder-gray-500">
            </div>

            <div class="pt-2 space-y-2">
                <button type="submit" class="w-full py-3 bg-amber-600 hover:bg-amber-700 text-white font-black text-xs uppercase border-2 border-black rounded-sm shadow-[3px_3px_0px_#000] cursor-pointer">
                    KIRIM PENDAFTARAN
                </button>
                <a href="login.html" class="block text-center w-full py-2 bg-[#12131a] text-gray-400 font-bold text-[10px] uppercase border border-black rounded-sm">
                    Kembali ke Login
                </a>
            </div>
        </form>
    </div>

    <script>
        const DB_URL = "https://yizoloveqztkgrlxdnvq.supabase.co";
        const DB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpem9sb3ZlcXp0a2dybHhkbnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjA1MzIsImV4cCI6MjA5OTE5NjUzMn0.3nMMr8x0IS1U-KJvB6Z0QPcsr598k7jBjQYzMmBbXMA";

        // FUNCTION: HANDLE REGISTER
        async function handleRegister(e) {
            e.preventDefault();

            const nama = document.getElementById('reg-nama').value.trim();
            const badge = document.getElementById('reg-badge').value.trim();
            const pangkat = document.getElementById('reg-pangkat').value;
            const password = document.getElementById('reg-password').value;

            if(!nama || !badge || !password) {
                alert("Mohon isi semua data!");
                return;
            }

            try {
                const checkRes = await fetch(`${DB_URL}/rest/v1/roster_personel?or=(nama_ic.eq.${nama},badge.eq.${badge})`, {
                    headers: { 'apikey': DB_KEY }
                });
                const existing = await checkRes.json();

                if (existing.length > 0) {
                    alert("Nama IC atau Nomor Badge tersebut sudah digunakan!");
                    return;
                }

                const regRes = await fetch(`${DB_URL}/rest/v1/roster_personel`, {
                    method: 'POST',
                    headers: {
                        'apikey': DB_KEY,
                        'Authorization': `Bearer ${DB_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        nama_ic: nama,
                        badge: parseInt(badge),
                        pangkat: pangkat,
                        password: password,
                        status_akun: 'PENDING',
                        total_jam_duty: 0,
                        poin_prp: 0,
                        is_admin: false
                    })
                });

                if (regRes.ok) {
                    alert("Pendaftaran Berhasil! Silakan hubungi Jendral/Admin untuk mengaktifkan akun Anda.");
                    document.getElementById('register-form').reset();
                    window.location.href = 'login.html';
                } else {
                    alert("Gagal mengirim data pendaftaran ke server.");
                }

            } catch (err) {
                alert("Terjadi kesalahan koneksi saat mendaftar.");
            }
        }
    </script>
</body>
</html>
